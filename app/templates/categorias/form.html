{% extends "base.html" %}

{% if categoria %}
    {% set titulo = "Editar categoría" %}
{% else %}
    {% set titulo = "Nueva categoría" %}
{% endif %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="mb-4">{{ titulo }}</h1>

                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            value="{{ categoria.nombre if categoria else '' }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea
                            class="form-control"
                            id="descripcion"
                            name="descripcion"
                            rows="3"
                        >{{ categoria.descripcion if categoria and categoria.descripcion else '' }}</textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="activo"
                            name="activo"
                            {% if categoria %}
                                {% if categoria.activo %}checked{% endif %}
                            {% else %}
                                checked
                            {% endif %}
                        >
                        <label class="form-check-label" for="activo">
                            Activa
                        </label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Guardar</button>
                        <a href="{{ url_for('categorias.index') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
