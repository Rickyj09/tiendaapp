{% extends "base.html" %}

{% block title %}Nueva entrada de inventario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="mb-4">Nueva entrada de inventario</h1>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="producto_id" class="form-label">Producto</label>
                            <select class="form-select" id="producto_id" name="producto_id" required>
                                <option value="">Seleccione...</option>
                                {% for producto in productos %}
                                    <option value="{{ producto.id }}">
                                        {{ producto.nombre }} | {{ producto.codigo }} | Stock actual: {{ producto.stock_actual }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="cantidad" class="form-label">Cantidad</label>
                            <input
                                type="number"
                                min="1"
                                class="form-control"
                                id="cantidad"
                                name="cantidad"
                                required
                            >
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="costo_unitario" class="form-label">Costo unitario</label>
                            <input
                                type="number"
                                step="0.01"
                                min="0"
                                class="form-control"
                                id="costo_unitario"
                                name="costo_unitario"
                            >
                        </div>

                        <div class="col-12">
                            <label for="observacion" class="form-label">Observación</label>
                            <textarea
                                class="form-control"
                                id="observacion"
                                name="observacion"
                                rows="3"
                                placeholder="Compra, reposición, corrección, mercadería nueva..."
                            ></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-dark">Guardar</button>
                        <a href="{{ url_for('inventario.index') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
